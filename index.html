<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Cards</title>

<style>

body{
margin:0;
padding:0;
background:#f3f3f3;
font-family:sans-serif;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin:80px 0;
padding:10px;
transition:transform 0.3s ease;
}

.card img{
width:100%;
border-radius:8px;
}

.caption{
text-align:center;
font-size:15px;
margin-top:8px;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="image.jpg">
<div class="caption">Tum muskan mein jaan ho...</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 2</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 3</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 4</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 5</div>
</div>

</div>

<script>

const cards=document.querySelectorAll(".card");

window.addEventListener("scroll",()=>{

cards.forEach(card=>{

let rect=card.getBoundingClientRect();
let center=window.innerHeight/2;

let rotate=(rect.top-center)/40;

rotate=Math.max(-10,Math.min(10,rotate));

card.style.transform=`rotateY(${rotate}deg)`;

});

});

</script>

</body>
</html>
