<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilt Cards</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:sans-serif;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin:100px 0;
padding:10px;
transition:transform 0.3s ease;
}

.card img{
width:100%;
border-radius:8px;
}

.caption{
text-align:center;
margin-top:8px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="image.jpg">
<div class="caption">Card 1</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 2</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 3</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 4</div>
</div>

<div class="card">
<img src="image.jpg">
<div class="caption">Card 5</div>
</div>

</div>

<script>

const cards=document.querySelectorAll(".card");

cards.forEach((card,index)=>{

// default tilt
if(index%2==0){
card.style.transform="rotateY(-10deg)";
}else{
card.style.transform="rotateY(10deg)";
}

});

window.addEventListener("scroll",()=>{

cards.forEach((card,index)=>{

let rect=card.getBoundingClientRect();
let center=window.innerHeight/2;

let rotate=(rect.top-center)/40;

rotate=Math.max(-10,Math.min(10,rotate));

// alternate direction
if(index%2==0){
card.style.transform=`rotateY(${rotate-5}deg)`;
}else{
card.style.transform=`rotateY(${rotate+5}deg)`;
}

});

});

</script>

</body>
</html>
